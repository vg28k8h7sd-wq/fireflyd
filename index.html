<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Firefly'd</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #000000;
    --near-black: #080807;
    --amber: #e8a030;
    --amber-dim: rgba(232,160,48,0.15);
    --amber-glow: rgba(232,160,48,0.06);
    --blue: #2a6fd4;
    --white: #f0ebe2;
    --white-dim: rgba(240,235,226,0.5);
    --white-ghost: rgba(240,235,226,0.15);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--black);
    color: var(--white);
    font-family: 'Cormorant Garamond', Georgia, serif;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor — a tiny firefly dot */
  .cursor {
    position: fixed;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--amber);
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease;
    box-shadow: 0 0 8px 2px rgba(232,160,48,0.6);
  }

  .cursor-trail {
    position: fixed;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(232,160,48,0.2);
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
  }

  /* Scene container */
  .scene {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
  }

  /* Atmospheric grain overlay */
  .grain {
    position: fixed;
    inset: -50%;
    width: 200%; height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 1;
    animation: grain-shift 8s steps(10) infinite;
  }

  @keyframes grain-shift {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-2%, -3%); }
    20% { transform: translate(3%, 1%); }
    30% { transform: translate(-1%, 4%); }
    40% { transform: translate(2%, -2%); }
    50% { transform: translate(-3%, 3%); }
    60% { transform: translate(1%, -1%); }
    70% { transform: translate(-2%, 2%); }
    80% { transform: translate(3%, -3%); }
    90% { transform: translate(-1%, 1%); }
  }

  /* Radial ambient glow behind logo */
  .ambient {
    position: fixed;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(232,160,48,0.04) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    animation: ambient-pulse 6s ease-in-out infinite;
    opacity: 0;
    animation-delay: 4s;
    animation-fill-mode: forwards;
  }

  @keyframes ambient-pulse {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
    50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
    100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
  }

  /* Floating firefly particles */
  .particles {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    animation: fade-in 2s ease forwards;
    animation-delay: 5s;
  }

  @keyframes fade-in {
    to { opacity: 1; }
  }

  .particle {
    position: absolute;
    width: 2px; height: 2px;
    border-radius: 50%;
    background: var(--amber);
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) translateX(0); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.4; }
    100% { transform: translateY(-10vh) translateX(var(--drift)); opacity: 0; }
  }

  /* LOGO */
  .logo-wrap {
    position: relative;
    z-index: 10;
    opacity: 0;
    animation: logo-reveal 3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 1s;
    margin-bottom: 48px;
  }

  @keyframes logo-reveal {
    0% { opacity: 0; transform: scale(0.85); filter: blur(12px); }
    60% { opacity: 0.8; filter: blur(2px); }
    100% { opacity: 1; transform: scale(1); filter: blur(0); }
  }

  .logo-svg {
    width: 100px; height: 100px;
    filter: drop-shadow(0 0 20px rgba(232,160,48,0.3));
    animation: logo-breathe 4s ease-in-out infinite;
    animation-delay: 4s;
  }

  @keyframes logo-breathe {
    0%, 100% { filter: drop-shadow(0 0 20px rgba(232,160,48,0.3)); }
    50% { filter: drop-shadow(0 0 35px rgba(232,160,48,0.5)); }
  }

  /* WORDMARK */
  .wordmark {
    position: relative;
    z-index: 10;
    opacity: 0;
    animation: text-reveal 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    animation-delay: 2.5s;
    margin-bottom: 16px;
    text-align: center;
  }

  @keyframes text-reveal {
    0% { opacity: 0; transform: translateY(12px); letter-spacing: 0.3em; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 0.15em; }
  }

  .wordmark-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(36px, 8vw, 64px);
    letter-spacing: 0.15em;
    color: var(--white);
    background: linear-gradient(135deg, #f0ebe2 0%, #c8b89a 50%, #f0ebe2 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
  }

  /* TAGLINE */
  .tagline {
    position: relative;
    z-index: 10;
    opacity: 0;
    animation: text-reveal 2s ease forwards;
    animation-delay: 3.8s;
    margin-bottom: 56px;
    text-align: center;
  }

  .tagline-text {
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    font-size: clamp(11px, 2vw, 13px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.8;
  }

  /* EMAIL FORM */
  .form-wrap {
    position: relative;
    z-index: 10;
    opacity: 0;
    animation: form-reveal 2s ease forwards;
    animation-delay: 5s;
    width: min(380px, 90vw);
    text-align: center;
  }

  @keyframes form-reveal {
    0% { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  .form-inner {
    display: flex;
    gap: 0;
    border: 1px solid rgba(232,160,48,0.2);
    border-radius: 2px;
    overflow: hidden;
    background: rgba(8,8,7,0.8);
    backdrop-filter: blur(10px);
    transition: border-color 0.3s ease;
  }

  .form-inner:focus-within {
    border-color: rgba(232,160,48,0.5);
    box-shadow: 0 0 20px rgba(232,160,48,0.08);
  }

  .email-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 14px 18px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 300;
    letter-spacing: 0.05em;
    color: var(--white);
    cursor: none;
  }

  .email-input::placeholder {
    color: rgba(240,235,226,0.2);
    letter-spacing: 0.1em;
  }

  .submit-btn {
    background: transparent;
    border: none;
    border-left: 1px solid rgba(232,160,48,0.15);
    padding: 14px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    cursor: none;
    transition: all 0.2s ease;
    white-space: nowrap;
  }

  .submit-btn:hover {
    background: rgba(232,160,48,0.08);
    color: #f5c15a;
  }

  .submit-btn:active {
    background: rgba(232,160,48,0.15);
  }

  /* Success state */
  .success-msg {
    display: none;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--amber);
    opacity: 0.7;
    padding: 14px 0;
    text-align: center;
  }

  .form-note {
    margin-top: 16px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: rgba(240,235,226,0.18);
    text-transform: uppercase;
  }

  /* Bottom mark */
  .bottom-mark {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    opacity: 0;
    animation: fade-in 2s ease forwards;
    animation-delay: 6.5s;
  }

  .bottom-text {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(240,235,226,0.12);
  }

  /* Divider line */
  .divider {
    position: relative;
    z-index: 10;
    width: min(120px, 30vw);
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(232,160,48,0.3), transparent);
    margin-bottom: 40px;
    opacity: 0;
    animation: fade-in 1.5s ease forwards;
    animation-delay: 3.2s;
  }
</style>
</head>
<body>

<!-- Custom cursor -->
<div class="cursor" id="cursor"></div>
<div class="cursor-trail" id="cursorTrail"></div>

<!-- Atmosphere -->
<div class="grain"></div>
<div class="ambient"></div>

<!-- Floating particles -->
<div class="particles" id="particles"></div>

<!-- Main scene -->
<div class="scene">

  <!-- Logo -->
  <div class="logo-wrap">
    <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <circle cx="50" cy="50" r="48" fill="none" stroke="#e8a030" stroke-width="1.5" opacity="0.6"/>
      <circle cx="50" cy="50" r="44" fill="#000" stroke="none"/>
      <text x="50" y="67"
        font-family="Georgia, serif"
        font-style="italic"
        font-weight="700"
        font-size="38"
        fill="#f0ebe2"
        text-anchor="middle"
        letter-spacing="-2">FF</text>
      <!-- Subtle inner ring -->
      <circle cx="50" cy="50" r="48" fill="none" stroke="#e8a030" stroke-width="0.5" opacity="0.2"/>
    </svg>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">
    <span class="wordmark-text">Firefly'd</span>
  </div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Tagline -->
  <div class="tagline">
    <span class="tagline-text">What your people are smoking.</span>
  </div>

  <!-- Email form -->
  <div class="form-wrap">
    <form
      action="https://formspree.io/f/xbdzwend"
      method="POST"
      id="earlyAccessForm"
      onsubmit="handleSubmit(event)"
    >
      <input type="hidden" name="form-name" value="early-access" />
      <p style="display:none"><input name="bot-field" /></p>
      <div class="form-inner" id="formInner">
        <input
          class="email-input"
          id="emailInput"
          name="email"
          type="email"
          placeholder="your@email.com"
          autocomplete="off"
          spellcheck="false"
          required
        />
        <button class="submit-btn" type="submit">
          Get Early Access
        </button>
      </div>
    </form>
    <div class="success-msg" id="successMsg">
      You're in. First come, first served. We got you. 🌿
    </div>
    <div class="form-note">Early access · Limited spots · No spam ever</div>
  </div>

</div>

<!-- Bottom mark -->
<div class="bottom-mark">
  <span class="bottom-text">Firefly'd · OC · Coming Soon</span>
</div>

<script>
  // Custom cursor
  const cursor = document.getElementById('cursor');
  const trail = document.getElementById('cursorTrail');
  let mx = 0, my = 0, tx = 0, ty = 0;

  document.addEventListener('mousemove', e => {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + 'px';
    cursor.style.top = my + 'px';
  });

  function animateTrail() {
    tx += (mx - tx) * 0.12;
    ty += (my - ty) * 0.12;
    trail.style.left = tx + 'px';
    trail.style.top = ty + 'px';
    requestAnimationFrame(animateTrail);
  }
  animateTrail();

  // Floating firefly particles
  const particlesEl = document.getElementById('particles');
  const count = 21;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random() * 2 + 1;
    const left = Math.random() * 100;
    const duration = Math.random() * 12 + 8;
    const delay = Math.random() * 10;
    const drift = (Math.random() - 0.5) * 120;
    const opacity = Math.random() * 0.6 + 0.2;
    p.style.cssText = `
      left: ${left}%;
      width: ${size}px;
      height: ${size}px;
      --drift: ${drift}px;
      animation-duration: ${duration}s;
      animation-delay: ${delay}s;
      opacity: ${opacity};
      box-shadow: 0 0 ${size * 3}px rgba(232,160,48,0.8);
    `;
    particlesEl.appendChild(p);
  }

  // Form submission
  function handleSubmit(e) {
    e.preventDefault();
    const form = document.getElementById('earlyAccessForm');
    const formInner = document.getElementById('formInner');
    const successMsg = document.getElementById('successMsg');
    const email = document.getElementById('emailInput').value.trim();

    if (!email || !email.includes('@')) {
      document.getElementById('emailInput').placeholder = 'enter a valid email';
      return;
    }

    // Submit to Netlify
    fetch('/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(new FormData(form)).toString()
    })
    .then(() => {
      formInner.style.transition = 'opacity 0.4s ease, transform 0.4s ease';
      formInner.style.opacity = '0';
      formInner.style.transform = 'translateY(-8px)';
      setTimeout(() => {
        formInner.style.display = 'none';
        successMsg.style.display = 'block';
        successMsg.style.animation = 'text-reveal 0.8s ease forwards';
      }, 400);
    })
    .catch(() => {
      // Still show success to user even if fetch fails
      formInner.style.display = 'none';
      successMsg.style.display = 'block';
    });
  }

  // Enter key submits
  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit(e);
  });

  // Subtle parallax on mouse move
  const scene = document.querySelector('.scene');
  document.addEventListener('mousemove', e => {
    const x = (e.clientX / window.innerWidth - 0.5) * 8;
    const y = (e.clientY / window.innerHeight - 0.5) * 8;
    scene.style.transform = `translate(${x * 0.3}px, ${y * 0.3}px)`;
  });
</script>
</body>
</html>
